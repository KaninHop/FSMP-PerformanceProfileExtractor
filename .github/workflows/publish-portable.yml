name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Windows
        run: |
          dotnet publish FSMPLogVisualizer.UI/FSMPLogVisualizer.UI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/win-x64
          mv ./publish/win-x64/FSMPLogVisualizer.UI.exe ./publish/FSMPLogVisualizer-windows.exe
      - name: Publish Linux
        run: |
          dotnet publish FSMPLogVisualizer.UI/FSMPLogVisualizer.UI.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish/linux-x64
          mv ./publish/linux-x64/FSMPLogVisualizer.UI ./publish/FSMPLogVisualizer-linux
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FSMPLogVisualizer-Portable
          path: |
            ./publish/FSMPLogVisualizer-windows.exe
            ./publish/FSMPLogVisualizer-linux

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: FSMPLogVisualizer-Portable
          path: ./release-assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Latest Build' || github.ref_name }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: |
            ./release-assets/FSMPLogVisualizer-windows.exe
            ./release-assets/FSMPLogVisualizer-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
